{% extends "base.html" %}

{% block content %}
<div class="card dashboard-card">

    <!-- Welcome Section -->
    <div class="welcome-section">
        <h2>Welcome, {{ name }} 👋</h2>
        <p class="subtitle">
            What would you like to explore today?
        </p>
    </div>

    <!-- Dashboard Actions -->
    <div class="dashboard-grid">

        <!-- All Products -->
        <a href="{{ url_for('products', user_id=user_id) }}" class="dash-card">
            <div class="dash-icon">🛍️</div>
            <h3>All Products</h3>
            <p>Browse everything we offer</p>
        </a>

        <!-- Recommendations -->
        <a href="{{ url_for('recommendations', user_id=user_id) }}" class="dash-card highlight">
            <div class="dash-icon">⭐</div>
            <h3>My Recommendations</h3>
            <p>Personalized just for you</p>
        </a>

        <!-- Update Preferences -->
        <a href="{{ url_for('preferences', user_id=user_id) }}" class="dash-card">
            <div class="dash-icon">⚙️</div>
            <h3>Update Preferences</h3>
            <p>Edit your interests</p>
        </a>

    </div>
</div>
{% endblock %}
