{% extends "base.html" %}
{% block content %}
<div class="products-card">
    <h2 class="page-title">📦 Product Details</h2>

    {% if product %}
    <div class="product-card" style="max-width: 520px; margin: 0 auto;">
        <div class="product-image">
            <img
                src="{{ url_for(
                    'static',
                    filename='images/products/' ~
                    (product.product_name | lower | replace(' ', '_')) ~
                    '.jpeg'
                ) }}"
                onerror="this.src='{{ url_for('static', filename='images/products/default.jpeg') }}'"
                alt="{{ product.product_name }}"
            >
        </div>

        <h3 class="product-title">{{ product.product_name }}</h3>
        <span class="category-badge">{{ product.category_display }}</span>
        <p class="price">₹{{ product.price }}</p>
        <p class="reason-text">{{ product.description }}</p>

        <div class="cart-actions">
            <a class="btn-cart" href="{{ url_for('products', user_id=user_id) }}">
                ⬅ Back
            </a>
            <a class="buy-btn" href="{{ url_for('buy_product', user_id=user_id, product_id=product.product_id) }}">
                Buy Now
            </a>
        </div>
    </div>
    {% else %}
    <p>No product found 😕</p>
    {% endif %}
</div>
{% endblock %}
