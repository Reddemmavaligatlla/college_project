<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "RecoMart" }}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">RecoMart</div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        {% block content %}{% endblock %}
    </div>

    <!-- ✅ ADDED: Category filtering JS (for Home page categories) -->
    <script>
        function filterCategory(category) {
            let products = document.querySelectorAll(".product-card");
            let kidsSub = document.getElementById("kidsSub");

            if (kidsSub) kidsSub.style.display = "none";

            products.forEach(product => {
                if (category === "all" || product.classList.contains(category)) {
                    product.style.display = "block";
                } else {
                    product.style.display = "none";
                }
            });
        }

        function showKids() {
            let kidsSub = document.getElementById("kidsSub");
            if (kidsSub) kidsSub.style.display = "flex";
        }
    </script>

</body>
</html>
